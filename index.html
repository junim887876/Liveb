<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel TV - Múltiplos Vídeos + L-Bar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #display-screen {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #ad-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 0.5s ease;
        }

        /* O container que faz o movimento do "L" */
        #video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: #000; 
        }

        .shrunk {
            width: 75% !important;
            height: 75% !important;
            top: 0 !important;
            left: 0 !important;
            border-bottom-right-radius: 20px;
            border-right: 4px solid #fff;
            border-bottom: 4px solid #fff;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.8);
        }

        /* O player do YouTube ocupa 100% do wrapper */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Evita que cliquem no vídeo sem querer */
        }
    </style>
</head>
<body>

    <div id="display-screen">
        <div id="ad-background"></div>
        <div id="video-wrapper">
            <div id="player"></div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // ==========================================
        // 1. LISTA DE VÍDEOS (Adicione quantos quiser)
        // ==========================================
        const filaDeVideos = [
            "https://youtu.be/Wu3Y_v8JeE8?is=T1FxP2UN5u2rd7ad",
            "https://www.youtube.com/live/CQeTZ1fCJFw?is=9AYhzclujDEakynD",
            "https://www.youtube.com/live/EfRQHpB3BPY?is=lXbDMKRE3R5hg341",
            "https://youtu.be/MAIS_UM_LINK_AQUI"
        ];

        // ==========================================
        // 2. LISTA DE ANÚNCIOS
        // ==========================================
        const anuncios = [
            'anuncio101.jpg',
            'anuncio100.jpg'
        ];

        // ==========================================
        // 3. CONFIGURAÇÃO DE TEMPO (em segundos)
        // ==========================================
        const TEMPO_LIVE_CHEIA = 10; 
        const TEMPO_DO_ANUNCIO = 5; 

        // ==========================================
        // LÓGICA DO SISTEMA (Não precisa alterar)
        // ==========================================
        let videoAtualIndex = 0;
        let anuncioAtualIndex = 0;
        let player;

        // Função para extrair o ID de qualquer link do YouTube
        function extrairVideoID(url) {
            const regex = /(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|live\/))([\w-]{11})/i;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // Essa função é chamada automaticamente pelo script da API do YouTube
        function onYouTubeIframeAPIReady() {
            const primeiroVideoID = extrairVideoID(filaDeVideos[videoAtualIndex]);
            
            player = new YT.Player('player', {
                videoId: primeiroVideoID,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0, // Esconde os controles
                    'modestbranding': 1,
                    'rel': 0 // Não mostra vídeos recomendados de outros canais no final
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // Inicia o vídeo e a rotação de anúncios assim que o player carrega
            event.target.playVideo();
            loopDeAnuncios();
        }

        // Fica de olho no status do vídeo
        function onPlayerStateChange(event) {
            // Se o estado for 0 (YT.PlayerState.ENDED), significa que o vídeo acabou
            if (event.data === 0) {
                tocarProximoVideo();
            }
        }

        function tocarProximoVideo() {
            videoAtualIndex++;
            
            // Se chegou no final da lista, volta para o primeiro vídeo (loop infinito)
            if (videoAtualIndex >= filaDeVideos.length) {
                videoAtualIndex = 0;
            }

            const proximoID = extrairVideoID(filaDeVideos[videoAtualIndex]);
            if (proximoID) {
                player.loadVideoById(proximoID); // Troca o vídeo instantaneamente
            }
        }

        function loopDeAnuncios() {
            const wrapper = document.getElementById('video-wrapper');
            const fundoAnuncio = document.getElementById('ad-background');

            wrapper.classList.remove('shrunk'); // Tela cheia

            setTimeout(() => {
                fundoAnuncio.style.backgroundImage = `url('${anuncios[anuncioAtualIndex]}')`;
                wrapper.classList.add('shrunk'); // Encolhe em L

                setTimeout(() => {
                    anuncioAtualIndex++;
                    if (anuncioAtualIndex >= anuncios.length) anuncioAtualIndex = 0;
                    
                    loopDeAnuncios(); // Repete o ciclo do anúncio

                }, TEMPO_DO_ANUNCIO * 1000); 

            }, TEMPO_LIVE_CHEIA * 1000); 
        }
    </script>
</body>
</html>
