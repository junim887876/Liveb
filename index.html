<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel L-Bar Automático</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #display-screen {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #ad-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 0.5s ease;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: #000; 
        }

        .shrunk {
            width: 75% !important;
            height: 75% !important;
            top: 0 !important;
            left: 0 !important;
            border-bottom-right-radius: 20px;
            border-right: 4px solid #fff;
            border-bottom: 4px solid #fff;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.8);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="display-screen">
        <div id="ad-background"></div>
        <div id="video-container"></div>
    </div>

    <script>
        // LINK DA LIVE FIXO
        const linkYoutube = "https://youtu.be/ny8EuG8Ob0s?is=O7YlvH-xF2p4Ijx4";

        // LISTA DE ANÚNCIOS
        const anuncios = [
            'anuncio.jpg'
        ];

        let anuncioAtual = 0;

        function extrairVideoID(url) {
            const regex = /(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|live\/))([\w-]{11})/i;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function iniciarSistema() {
            const videoID = extrairVideoID(linkYoutube);

            if (!videoID) return;

            const videoContainer = document.getElementById('video-container');
            // mute=1 garante o autoplay imediato sem bloqueio do navegador
            videoContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoID}?autoplay=1&mute=0&controls=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

            loopDeAnuncios();
        }

        function loopDeAnuncios() {
            const video = document.getElementById('video-container');
            const fundoAnuncio = document.getElementById('ad-background');

            video.classList.remove('shrunk');

            setTimeout(() => {
                fundoAnuncio.style.backgroundImage = `url('${anuncios[anuncioAtual]}')`;
                video.classList.add('shrunk');

                setTimeout(() => {
                    anuncioAtual++;
                    if (anuncioAtual >= anuncios.length) anuncioAtual = 0;
                    loopDeAnuncios();
                }, 3000); 

            }, 5000); 
        }

        // Executa automaticamente assim que a página abre
        window.onload = iniciarSistema;
    </script>
</body>
</html>
